# REG-3: CI regression - run full regression on push/PR; fail on mismatch.
name: Regression
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  regression:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-action@stable
        with:
          components: rustfmt
      - name: Build release
        run: cargo build --release
      - name: Run regression
        run: .\run_regression.ps1
