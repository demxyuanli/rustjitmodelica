name: jit-ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
      - name: Build jit-compiler
        run: cargo build -p jit-compiler --all-features
      - name: Run jit-compiler tests
        run: cargo test -p jit-compiler --all-features -- --nocapture
